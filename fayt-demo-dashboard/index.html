<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fayt Systems Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 0%, rgba(14,165,233,.16), transparent 32%),
        radial-gradient(circle at 85% 16%, rgba(20,184,166,.12), transparent 32%),
        linear-gradient(135deg, #020617, #07111f 48%, #020617);
      color: #e5eefb;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 20px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .top {
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 950;
      letter-spacing: -0.04em;
      font-size: 26px;
    }

    .status {
      border: 1px solid rgba(34,197,94,.34);
      color: #bbf7d0;
      background: rgba(20,83,45,.18);
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .grid {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 400px;
      gap: 16px;
      min-height: calc(100vh - 94px);
    }

    .chart, .card {
      border: 1px solid rgba(148,163,184,.18);
      background: linear-gradient(180deg, rgba(15,23,42,.92), rgba(2,6,23,.9));
      border-radius: 26px;
      box-shadow: 0 26px 80px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
    }

    .chart {
      position: relative;
      min-height: 620px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 620px;
    }

    .chartFooter {
      position: absolute;
      left: 18px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      pointer-events: none;
    }

    .chip {
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(2,6,23,.72);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 8px 11px;
      font-weight: 850;
      font-size: 12px;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .pnl {
      padding: 18px;
    }

    .pnl span, .focus span {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .pnl strong {
      display: block;
      margin-top: 4px;
      font-size: 46px;
      letter-spacing: -0.06em;
      color: #86efac;
    }

    .focus {
      padding: 18px;
    }

    .focus strong {
      display: block;
      margin-top: 4px;
      font-size: 28px;
      letter-spacing: -0.04em;
    }

    .trades {
      flex: 1;
      padding: 16px;
      min-height: 420px;
    }

    .title {
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr .72fr .9fr .9fr;
      gap: 8px;
      align-items: center;
    }

    .head {
      color: #94a3b8;
      font-size: 10px;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 0 10px 5px;
    }

    .trade {
      width: 100%;
      color: #e2e8f0;
      background: rgba(15,23,42,.66);
      border: 1px solid rgba(148,163,184,.14);
      border-radius: 15px;
      padding: 11px 10px;
      cursor: pointer;
      text-align: left;
      font: inherit;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 8px;
    }

    .trade:hover, .trade.active {
      border-color: rgba(45,212,191,.46);
      background: rgba(20,184,166,.13);
    }

    .long { color: #86efac; }
    .short { color: #fca5a5; }

    .warning {
      display: none;
      max-width: 1440px;
      margin: 0 auto;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(251,191,36,.25);
      color: #fde68a;
      background: rgba(120,53,15,.28);
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .chart, canvas { min-height: 460px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <div class="brand">Fayt Systems</div>
      <div class="status" id="status">Connecting</div>
    </div>

    <div class="warning" id="warning"></div>

    <main class="grid">
      <section class="chart">
        <canvas id="chart"></canvas>
        <div class="chartFooter">
          <div class="chip" id="activeSymbol">—</div>
          <div class="chip" id="openCount">— open</div>
        </div>
      </section>

      <aside class="side">
        <section class="card pnl">
          <span>Running PnL</span>
          <strong id="runningPnl">$0.00</strong>
        </section>

        <section class="card focus">
          <span>Active Display</span>
          <strong id="focusSymbol">—</strong>
        </section>

        <section class="card trades">
          <div class="title">Live Trades</div>
          <div class="row head">
            <span>Symbol</span>
            <span>Side</span>
            <span>Target Exit</span>
            <span>Current</span>
          </div>
          <div id="tradeRows"></div>
        </section>
      </aside>
    </main>
  </div>

<script>
(() => {
  const API = "https://demo-api.faytsystems.com";
  let activeSymbol = "ARB/USD";
  let candles = [];
  let trades = [];
  let markers = [];

  const $ = (id) => document.getElementById(id);

  function setStatus(text, ok = true) {
    $("status").textContent = text;
    $("status").style.borderColor = ok ? "rgba(34,197,94,.34)" : "rgba(248,113,113,.34)";
    $("status").style.color = ok ? "#bbf7d0" : "#fecaca";
  }

  function warn(text) {
    const w = $("warning");
    if (!text) {
      w.style.display = "none";
      w.textContent = "";
      return;
    }
    w.style.display = "block";
    w.textContent = text;
  }

  function money(v) {
    const n = Number(v || 0);
    const sign = n > 0 ? "+" : "";
    return sign + "$" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmt(v) {
    if (v === null || v === undefined || Number.isNaN(Number(v))) return "—";
    const n = Number(v);
    return n.toLocaleString(undefined, {
      minimumFractionDigits: n < 1 ? 4 : 2,
      maximumFractionDigits: n < 1 ? 6 : 2
    });
  }

  function sideLabel(s) {
    s = String(s || "").toLowerCase();
    if (s.includes("short") || s === "sell") return "Short";
    if (s.includes("long") || s === "buy") return "Long";
    return s || "—";
  }

  async function json(url) {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(url + " -> " + res.status);
    return await res.json();
  }

  async function loadTrades() {
    const data = await json(API + "/demo/live-trades");
    trades = Array.isArray(data.trades) ? data.trades : [];
    markers = Array.isArray(data.markers) ? data.markers : [];

    $("runningPnl").textContent = money(data.running_pnl);
    $("openCount").textContent = trades.filter(t => String(t.status).toLowerCase() === "open").length + " open";

    if (trades.length && !trades.some(t => t.symbol === activeSymbol)) {
      activeSymbol = trades[0].symbol;
    }

    renderTrades();
  }

  async function loadCandles() {
    const url = API + "/demo/live-candles?symbol=" + encodeURIComponent(activeSymbol) + "&timeframe=60m&limit=96";
    const data = await json(url);
    candles = Array.isArray(data.candles) ? data.candles : [];
    draw();
  }

  function renderTrades() {
    $("activeSymbol").textContent = activeSymbol;
    $("focusSymbol").textContent = activeSymbol;

    const host = $("tradeRows");
    host.innerHTML = "";

    trades.slice(0, 10).forEach(t => {
      const btn = document.createElement("button");
      btn.className = "trade row" + (t.symbol === activeSymbol ? " active" : "");
      btn.type = "button";
      btn.innerHTML = `
        <span>${t.symbol || "—"}</span>
        <span class="${String(t.side).toLowerCase().includes("short") ? "short" : "long"}">${sideLabel(t.side)}</span>
        <span>${fmt(t.target_exit_price)}</span>
        <span>${fmt(t.current_price)}</span>
      `;
      btn.onclick = () => {
        activeSymbol = t.symbol;
        renderTrades();
        loadCandles().catch(e => warn(e.message));
      };
      host.appendChild(btn);
    });

    if (!trades.length) {
      host.innerHTML = '<div style="color:#94a3b8;font-weight:800;padding:16px;border:1px dashed rgba(148,163,184,.25);border-radius:16px;">No trades returned.</div>';
    }
  }

  function draw() {
    const canvas = $("chart");
    const parent = canvas.parentElement;
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = parent.clientWidth;
    const h = parent.clientHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, "#050816");
    bg.addColorStop(.5, "#07111f");
    bg.addColorStop(1, "#020617");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    if (!candles.length) {
      ctx.fillStyle = "rgba(226,232,240,.8)";
      ctx.font = "800 18px system-ui";
      ctx.fillText("Waiting for candle feed", 32, 48);
      return;
    }

    const pad = { left: 54, right: 30, top: 34, bottom: 48 };
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    const highs = candles.map(c => Number(c.high));
    const lows = candles.map(c => Number(c.low));
    const maxP = Math.max(...highs);
    const minP = Math.min(...lows);
    const span = Math.max(.0000001, maxP - minP);

    const y = p => pad.top + ((maxP - Number(p)) / span) * plotH;
    const xAt = i => pad.left + (plotW / Math.max(1, candles.length - 1)) * i;

    ctx.strokeStyle = "rgba(148,163,184,.12)";
    ctx.lineWidth = 1;
    for (let i = 0; i <= 6; i++) {
      const yy = pad.top + plotH / 6 * i;
      ctx.beginPath();
      ctx.moveTo(pad.left, yy);
      ctx.lineTo(w - pad.right, yy - 22);
      ctx.stroke();
    }
    for (let i = 0; i <= 10; i++) {
      const xx = pad.left + plotW / 10 * i;
      ctx.beginPath();
      ctx.moveTo(xx, pad.top + plotH);
      ctx.lineTo(xx + 24, pad.top);
      ctx.stroke();
    }

    const gap = plotW / Math.max(1, candles.length);
    const bodyW = Math.max(4, Math.min(13, gap * .52));

    candles.forEach((c, i) => {
      const x = xAt(i);
      const open = Number(c.open), close = Number(c.close), high = Number(c.high), low = Number(c.low);
      const up = close >= open;
      const yo = y(open), yc = y(close), yh = y(high), yl = y(low);
      const top = Math.min(yo, yc), bottom = Math.max(yo, yc);
      const bodyH = Math.max(2, bottom - top);
      const main = up ? "#2dd4bf" : "#fb7185";
      const side = up ? "rgba(20,184,166,.42)" : "rgba(190,18,60,.42)";

      ctx.strokeStyle = main;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(x, yh);
      ctx.lineTo(x, yl);
      ctx.stroke();

      ctx.fillStyle = up ? "rgba(45,212,191,.18)" : "rgba(251,113,133,.16)";
      ctx.fillRect(x - bodyW / 2 - 2, top - 2, bodyW + 4, bodyH + 4);

      const grad = ctx.createLinearGradient(x - bodyW / 2, top, x + bodyW / 2, bottom);
      grad.addColorStop(0, main);
      grad.addColorStop(1, up ? "#0f766e" : "#be123c");
      ctx.fillStyle = grad;
      ctx.fillRect(x - bodyW / 2, top, bodyW, bodyH);

      ctx.fillStyle = side;
      ctx.beginPath();
      ctx.moveTo(x + bodyW / 2, top);
      ctx.lineTo(x + bodyW / 2 + 7, top + 7);
      ctx.lineTo(x + bodyW / 2 + 7, bottom + 7);
      ctx.lineTo(x + bodyW / 2, bottom);
      ctx.closePath();
      ctx.fill();
    });

    const filtered = markers.filter(m => m.symbol === activeSymbol);
    const firstTime = new Date(candles[0].ts || candles[0].time || 0).getTime();
    const lastTime = new Date(candles[candles.length - 1].ts || candles[candles.length - 1].time || 0).getTime();
    const timeSpan = Math.max(1, lastTime - firstTime);

    filtered.forEach(m => {
      const mt = new Date(m.ts || "").getTime();
      let mx = w - pad.right - 18;
      if (!Number.isNaN(mt)) {
        mx = pad.left + ((mt - firstTime) / timeSpan) * plotW;
        mx = Math.max(pad.left, Math.min(w - pad.right, mx));
      }
      const my = y(Number(m.price));
      const isEntry = String(m.kind).toLowerCase() === "entry";

      ctx.save();
      ctx.shadowBlur = 18;
      ctx.shadowColor = isEntry ? "rgba(34,197,94,.9)" : "rgba(251,191,36,.9)";
      ctx.fillStyle = isEntry ? "#22c55e" : "#f59e0b";
      if (isEntry) {
        ctx.beginPath();
        ctx.arc(mx, my, 8, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(mx - 8, my - 8, 16, 16);
      }
      ctx.restore();

      ctx.fillStyle = "rgba(241,245,249,.88)";
      ctx.font = "800 11px system-ui";
      ctx.fillText(isEntry ? "ENTRY" : "EXIT", mx + 11, my - 10);
    });

    const last = candles[candles.length - 1];
    ctx.fillStyle = "rgba(226,232,240,.75)";
    ctx.font = "800 12px system-ui";
    ctx.fillText(activeSymbol, pad.left, h - 18);
    ctx.fillText("Last " + fmt(last.close), w - 130, h - 18);
  }

  async function tick() {
    try {
      warn("");
      await loadTrades();
      await loadCandles();
      setStatus("Live", true);
    } catch (e) {
      setStatus("Feed offline", false);
      warn(e.message || String(e));
      console.error(e);
    }
  }

  window.addEventListener("resize", draw);
  tick();
  setInterval(tick, 7000);
})();
</script>
</body>
</html>
